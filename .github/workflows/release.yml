name: Release

on:
  workflow_dispatch:
    inputs:
      bump:
        description: 'Version bump'
        required: true
        default: 'patch'
        type: choice
        options:
          - patch
          - minor
          - major
      summary:
        description: 'Release summary (used in CHANGELOG)'
        required: false
        default: 'Release'
        type: string
      dry-run:
        description: 'Dry run (no publish, no push)'
        required: false
        default: false
        type: boolean

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  release:
    name: Release ${{ inputs.bump }}
    # Real publishes only from main; dry-runs allowed from any branch.
    if: ${{ inputs.dry-run || github.ref == 'refs/heads/main' }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: '1.3.11'

      # Node 24 ships with npm 11.x; Trusted Publishing requires >=11.5.1.
      # We print the version below to surface a mismatch early if a Node 24
      # patch ever ships an older npm.
      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'

      - name: Verify npm version
        run: |
          which npm
          npm --version

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Type check
        run: bun run typecheck

      - name: Run tests
        run: bun test

      - name: Generate release changeset
        env:
          BUMP: ${{ inputs.bump }}
          SUMMARY: ${{ inputs.summary }}
        run: bun run release:changeset "$BUMP" "$SUMMARY"

      - name: Apply versions
        run: bun run version-packages

      - name: Capture new version
        id: version
        run: |
          version=$(node -p "require('./packages/react/package.json').version")
          echo "value=$version" >> "$GITHUB_OUTPUT"
          echo "Releasing $version"

      - name: Notify Slack — release started
        if: ${{ env.SLACK_WEBHOOK_URL != '' }}
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          VERSION: ${{ steps.version.outputs.value }}
          BUMP: ${{ inputs.bump }}
          DRY_RUN: ${{ inputs.dry-run }}
          ACTOR: ${{ github.actor }}
          SHA: ${{ github.sha }}
          RUN_NUMBER: ${{ github.run_number }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          short_sha="${SHA:0:12}"
          title=":rocket: docx-editor release started"
          if [ "$DRY_RUN" = "true" ]; then title="$title (dry-run)"; fi
          payload=$(jq -n \
            --arg title "$title" \
            --arg version "$VERSION" \
            --arg bump "$BUMP" \
            --arg sha "$short_sha" \
            --arg actor "$ACTOR" \
            --arg run_n "$RUN_NUMBER" \
            --arg run_url "$RUN_URL" \
            '{
              text: $title,
              blocks: [
                { type: "section", text: { type: "mrkdwn", text: "*\($title)*" } },
                { type: "section", fields: [
                  { type: "mrkdwn", text: "*Version*\n\($version) (`\($bump)`)" },
                  { type: "mrkdwn", text: "*Commit*\n`\($sha)`" },
                  { type: "mrkdwn", text: "*Triggered by*\n\($actor)" },
                  { type: "mrkdwn", text: "*Run*\n<\($run_url)|#\($run_n)>" }
                ] }
              ]
            }')
          curl -sSf -X POST -H 'Content-Type: application/json' -d "$payload" "$SLACK_WEBHOOK_URL" >/dev/null

      - name: Show diff
        run: git --no-pager diff --stat

      - name: Commit version bump
        if: ${{ !inputs.dry-run }}
        env:
          BUMP: ${{ inputs.bump }}
          VERSION: ${{ steps.version.outputs.value }}
        run: |
          git add -A
          git commit -m "chore: release v$VERSION ($BUMP)"

      - name: Push version commit
        if: ${{ !inputs.dry-run }}
        run: git push origin "HEAD:${{ github.ref_name }}"

      - name: Publish to npm (Trusted Publishing via OIDC)
        if: ${{ !inputs.dry-run }}
        run: bun run release
        env:
          NPM_CONFIG_PROVENANCE: 'true'

      - name: Publish (dry run)
        if: ${{ inputs.dry-run }}
        run: |
          bun run build
          bunx changeset publish --dry-run

      # !cancelled() so partial tags still ship if publish failed mid-flight.
      - name: Push tags
        if: ${{ !inputs.dry-run && !cancelled() }}
        run: git push origin --tags

      - name: Notify Slack — release succeeded
        if: ${{ success() && !inputs.dry-run && env.SLACK_WEBHOOK_URL != '' }}
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          VERSION: ${{ steps.version.outputs.value }}
          BUMP: ${{ inputs.bump }}
          ACTOR: ${{ github.actor }}
          RUN_NUMBER: ${{ github.run_number }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          editor_url="https://www.npmjs.com/package/@eigenpal/docx-js-editor/v/$VERSION"
          agents_url="https://www.npmjs.com/package/@eigenpal/docx-editor-agents/v/$VERSION"
          payload=$(jq -n \
            --arg version "$VERSION" \
            --arg bump "$BUMP" \
            --arg actor "$ACTOR" \
            --arg run_n "$RUN_NUMBER" \
            --arg run_url "$RUN_URL" \
            --arg editor "$editor_url" \
            --arg agents "$agents_url" \
            '{
              text: ":white_check_mark: docx-editor v\($version) released",
              blocks: [
                { type: "section", text: { type: "mrkdwn", text: ":white_check_mark: *docx-editor v\($version) released*" } },
                { type: "section", fields: [
                  { type: "mrkdwn", text: "*Version*\n\($version) (`\($bump)`)" },
                  { type: "mrkdwn", text: "*Triggered by*\n\($actor)" }
                ] },
                { type: "section", text: { type: "mrkdwn",
                  text: "*Packages*\n• <\($editor)|@eigenpal/docx-js-editor@\($version)>\n• <\($agents)|@eigenpal/docx-editor-agents@\($version)>" } },
                { type: "context", elements: [ { type: "mrkdwn", text: "<\($run_url)|Run #\($run_n)>" } ] }
              ]
            }')
          curl -sSf -X POST -H 'Content-Type: application/json' -d "$payload" "$SLACK_WEBHOOK_URL" >/dev/null

      - name: Notify Slack — release failed
        if: ${{ failure() && env.SLACK_WEBHOOK_URL != '' }}
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          VERSION: ${{ steps.version.outputs.value }}
          BUMP: ${{ inputs.bump }}
          DRY_RUN: ${{ inputs.dry-run }}
          ACTOR: ${{ github.actor }}
          RUN_NUMBER: ${{ github.run_number }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          title=":x: docx-editor release failed"
          if [ "$DRY_RUN" = "true" ]; then title="$title (dry-run)"; fi
          version_field="${VERSION:-(not yet computed)}"
          payload=$(jq -n \
            --arg title "$title" \
            --arg version "$version_field" \
            --arg bump "$BUMP" \
            --arg actor "$ACTOR" \
            --arg run_n "$RUN_NUMBER" \
            --arg run_url "$RUN_URL" \
            '{
              text: $title,
              blocks: [
                { type: "section", text: { type: "mrkdwn", text: "*\($title)*" } },
                { type: "section", fields: [
                  { type: "mrkdwn", text: "*Version*\n\($version) (`\($bump)`)" },
                  { type: "mrkdwn", text: "*Triggered by*\n\($actor)" },
                  { type: "mrkdwn", text: "*Run*\n<\($run_url)|#\($run_n)>" }
                ] }
              ]
            }')
          curl -sSf -X POST -H 'Content-Type: application/json' -d "$payload" "$SLACK_WEBHOOK_URL" >/dev/null
